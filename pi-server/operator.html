<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChowBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .status-bar { padding: 48px 24px 32px; text-align: center; transition: background 0.5s; }
  .status-bar.red { background: #dc2626; color: white; }
  .status-bar.yellow { background: #d97706; color: white; }
  .status-bar.green { background: #059669; color: white; }
  .status-bar.connecting { background: #2563eb; color: white; }

  .status-icon { font-size: 64px; margin-bottom: 12px; }
  .status-text { font-size: 28px; font-weight: 900; margin-bottom: 8px; line-height: 1.2; }
  .status-sub { font-size: 15px; opacity: 0.9; font-weight: 500; }

  .pulse-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: white; margin-left: 8px; animation: pulse 1.5s infinite; vertical-align: middle; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

  .body { flex: 1; background: #030712; padding: 20px; }

  .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1f293730; }
  .stat:last-child { border-bottom: none; }
  .stat .label { color: #9ca3af; font-size: 14px; }
  .stat .value { font-weight: 700; font-size: 14px; }
  .stat .value.green { color: #34d399; }
  .stat .value.red { color: #f87171; }
  .stat .value.yellow { color: #fbbf24; }
  .stat .value.white { color: #f3f4f6; }

  .hotspot-form { margin-top: 12px; }
  .hotspot-form input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #374151; background: #0a0f1a; color: #f3f4f6; font-size: 16px; outline: none; margin-bottom: 8px; }
  .hotspot-form input:focus { border-color: #f97316; }

  .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-orange { background: #f97316; color: white; }
  .btn-orange:hover { background: #ea580c; }
  .btn-orange:disabled { opacity: 0.5; }
  .btn-gray { background: #374151; color: #d1d5db; margin-top: 8px; }
  .btn-red { background: #dc2626; color: white; margin-top: 8px; }

  .orders-big { text-align: center; padding: 20px; }
  .orders-big .number { font-size: 48px; font-weight: 900; color: #f97316; }
  .orders-big .label { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .footer { text-align: center; padding: 16px; color: #374151; font-size: 11px; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .connect-msg { margin-top: 10px; font-size: 13px; text-align: center; min-height: 20px; }
</style>
</head>
<body>

<!-- Status Banner -->
<div class="status-bar red" id="status-bar">
  <div class="status-icon" id="status-icon">📡</div>
  <div class="status-text" id="status-text">Checking...</div>
  <div class="status-sub" id="status-sub">Starting up<span class="pulse-dot"></span></div>
</div>

<div class="body">
  <!-- Orders -->
  <div class="card">
    <div class="orders-big">
      <div class="number" id="order-count">-</div>
      <div class="label">orders today</div>
    </div>
  </div>

  <!-- Connection Details -->
  <div class="card">
    <h2>Connection</h2>
    <div class="stat"><span class="label">WiFi Network</span><span class="value white" id="conn-ssid">--</span></div>
    <div class="stat"><span class="label">Signal</span><span class="value" id="conn-signal">--</span></div>
    <div class="stat"><span class="label">IP Address</span><span class="value white" id="conn-ip">--</span></div>
    <div class="stat"><span class="label">Cloud Sync</span><span class="value" id="conn-sync">--</span></div>
  </div>

  <!-- Phone Hotspot Setup -->
  <div class="card" id="hotspot-card">
    <h2>Phone Internet</h2>
    <div id="hotspot-status"></div>
    <div class="hotspot-form" id="hotspot-form">
      <input type="text" id="hs-ssid" placeholder="Your phone hotspot name">
      <input type="password" id="hs-pass" placeholder="Hotspot password">
      <button class="btn btn-orange" onclick="saveHotspot()" id="hs-btn">Save & Connect</button>
      <div class="connect-msg" id="hs-msg"></div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="card">
    <h2>Quick Actions</h2>
    <button class="btn btn-gray" onclick="scanAndReconnect()">Reconnect WiFi</button>
    <button class="btn btn-gray" onclick="location.href='/admin'">Full Admin Panel</button>
  </div>

  <div class="footer">ChowBox v1.0 — auto-updates every 2s</div>
</div>

<script>
// ── State ──
let lastOnline = null;

async function refresh() {
  try {
    // Fetch all status in parallel
    const [statusRes, wifiRes, hotspotRes] = await Promise.all([
      fetch('/api/v1/admin/status').then(r => r.json()).catch(() => null),
      fetch('/api/v1/network/status').then(r => r.json()).catch(() => null),
      fetch('/api/v1/network/phone-hotspot').then(r => r.json()).catch(() => null),
    ]);

    const bar = document.getElementById('status-bar');
    const icon = document.getElementById('status-icon');
    const text = document.getElementById('status-text');
    const sub = document.getElementById('status-sub');

    const online = statusRes?.system?.online || false;
    const connected = wifiRes?.connected;

    // ── Big Status Banner ──
    if (online) {
      bar.className = 'status-bar green';
      icon.textContent = '✅';
      text.textContent = 'ChowBox is Online';
      sub.innerHTML = 'Connected to ' + esc(connected?.ssid || 'WiFi') + ' — ready to serve<span class="pulse-dot"></span>';
    } else if (connected) {
      bar.className = 'status-bar yellow';
      icon.textContent = '⚠️';
      text.textContent = 'Connected — No Internet';
      sub.innerHTML = 'Connected to ' + esc(connected.ssid) + ' but no internet detected<span class="pulse-dot"></span>';
    } else {
      bar.className = 'status-bar red';
      icon.textContent = '📡';
      text.textContent = 'No Internet';
      sub.innerHTML = 'Turn on your phone hotspot<span class="pulse-dot"></span>';
    }

    // ── Orders ──
    document.getElementById('order-count').textContent = statusRes?.orders?.today ?? '-';

    // ── Connection Details ──
    if (connected) {
      document.getElementById('conn-ssid').textContent = connected.ssid;
      document.getElementById('conn-signal').textContent = connected.signal + '%';
      document.getElementById('conn-signal').className = 'value ' + (connected.signal > 50 ? 'green' : connected.signal > 25 ? 'yellow' : 'red');
      document.getElementById('conn-ip').textContent = connected.ip || '--';
    } else {
      document.getElementById('conn-ssid').textContent = 'Not connected';
      document.getElementById('conn-ssid').className = 'value red';
      document.getElementById('conn-signal').textContent = '--';
      document.getElementById('conn-ip').textContent = '--';
    }
    document.getElementById('conn-sync').textContent = online ? 'Active' : 'Offline';
    document.getElementById('conn-sync').className = 'value ' + (online ? 'green' : 'red');

    // ── Hotspot Config ──
    const hsStatus = document.getElementById('hotspot-status');
    const hsForm = document.getElementById('hotspot-form');
    if (hotspotRes?.configured && hotspotRes.ssid) {
      hsStatus.innerHTML = '<div style="background:#065f4620;border:1px solid #34d39940;border-radius:10px;padding:12px;margin-bottom:12px;">' +
        '<span style="color:#34d399;font-weight:700;">✓ Auto-connects to: ' + esc(hotspotRes.ssid) + '</span></div>';
      document.getElementById('hs-ssid').value = hotspotRes.ssid;
    } else {
      hsStatus.innerHTML = '<div style="background:#7f1d1d20;border:1px solid #f8717140;border-radius:10px;padding:12px;margin-bottom:12px;">' +
        '<span style="color:#f87171;font-weight:700;">Not set up</span><br>' +
        '<span style="color:#9ca3af;font-size:12px;">Enter your phone hotspot name so ChowBox gets internet at events.</span></div>';
    }

  } catch (e) {
    document.getElementById('status-bar').className = 'status-bar red';
    document.getElementById('status-text').textContent = 'Connection Error';
    document.getElementById('status-sub').innerHTML = 'Cannot reach ChowBox server<span class="pulse-dot"></span>';
  }
}

async function saveHotspot() {
  const ssid = document.getElementById('hs-ssid').value.trim();
  const password = document.getElementById('hs-pass').value;
  const btn = document.getElementById('hs-btn');
  const msg = document.getElementById('hs-msg');
  if (!ssid) { msg.innerHTML = '<span style="color:#f87171;">Enter hotspot name</span>'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Connecting...';
  msg.innerHTML = '<span style="color:#fbbf24;">Saving and connecting...</span>';

  try {
    const res = await fetch('/api/v1/network/phone-hotspot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ssid, password: password || undefined }),
    });
    const d = await res.json();
    if (d.success) {
      if (d.connected && d.internet) {
        msg.innerHTML = '<span style="color:#34d399;">✓ Connected with internet!</span>';
      } else if (d.connected) {
        msg.innerHTML = '<span style="color:#fbbf24;">✓ Connected — waiting for internet...</span>';
      } else {
        msg.innerHTML = '<span style="color:#9ca3af;">Saved. Turn on your phone hotspot — ChowBox will connect automatically.</span>';
      }
      document.getElementById('hs-pass').value = '';
      setTimeout(refresh, 2000);
    } else {
      msg.innerHTML = '<span style="color:#f87171;">✗ ' + esc(d.error || 'Failed') + '</span>';
    }
  } catch {
    msg.innerHTML = '<span style="color:#f87171;">✗ Request failed</span>';
  }
  btn.disabled = false;
  btn.textContent = 'Save & Connect';
}

async function scanAndReconnect() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Reconnecting...';
  try {
    // Try to connect to saved hotspot
    const hs = await fetch('/api/v1/network/phone-hotspot').then(r => r.json());
    if (hs.configured && hs.ssid) {
      await fetch('/api/v1/network/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ssid: hs.ssid }),
      });
    }
    setTimeout(refresh, 3000);
  } catch {}
  btn.disabled = false;
  btn.textContent = 'Reconnect WiFi';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Auto-refresh every 2s
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
