<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChowBox Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #030712; color: #e5e7eb; min-height: 100vh; }
  .header { background: #111827; border-bottom: 1px solid #1f2937; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 900; color: #f97316; }
  .header .badge { font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 700; }
  .online { background: #065f4620; color: #34d399; border: 1px solid #34d39930; }
  .offline { background: #7f1d1d20; color: #f87171; border: 1px solid #f8717130; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; padding: 24px; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; }
  .card h2 { font-size: 13px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1f293750; }
  .stat:last-child { border-bottom: none; }
  .stat .label { color: #6b7280; font-size: 13px; }
  .stat .value { color: #f3f4f6; font-weight: 700; font-size: 14px; }
  .stat .value.green { color: #34d399; }
  .stat .value.red { color: #f87171; }
  .stat .value.orange { color: #f97316; }
  .stat .value.yellow { color: #fbbf24; }
  .btn { padding: 10px 16px; border-radius: 10px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 8px; }
  .btn-orange { background: #f97316; color: white; }
  .btn-orange:hover { background: #ea580c; }
  .btn-green { background: #059669; color: white; }
  .btn-green:hover { background: #047857; }
  .btn-red { background: #dc2626; color: white; }
  .btn-red:hover { background: #b91c1c; }
  .btn-gray { background: #374151; color: #d1d5db; }
  .btn-gray:hover { background: #4b5563; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .footer { text-align: center; padding: 20px; color: #374151; font-size: 12px; }
  .log { font-family: monospace; font-size: 11px; color: #6b7280; background: #0a0f1a; border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; margin-top: 12px; }
  .log-entry { padding: 2px 0; border-bottom: 1px solid #111827; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #065f46; color: #34d399; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 100; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>ChowBox Admin</h1>
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <span id="status-badge" class="badge offline">checking...</span>
    <span style="color: #374151; font-size: 12px;" id="refresh-timer">5s</span>
  </div>
</div>

<div class="grid">
  <!-- System -->
  <div class="card">
    <h2>System</h2>
    <div class="stat"><span class="label">Internet</span><span class="value" id="sys-internet">--</span></div>
    <div class="stat"><span class="label">Cloud Target</span><span class="value" id="sys-cloud">--</span></div>
    <div class="stat"><span class="label">Uptime</span><span class="value" id="sys-uptime">--</span></div>
    <div class="stat"><span class="label">Memory</span><span class="value" id="sys-memory">--</span></div>
    <div class="stat"><span class="label">Node.js</span><span class="value" id="sys-node">--</span></div>
    <div class="stat"><span class="label">PID</span><span class="value" id="sys-pid">--</span></div>
  </div>

  <!-- Printer -->
  <div class="card">
    <h2>Printer</h2>
    <div class="stat"><span class="label">Status</span><span class="value" id="printer-status">--</span></div>
    <div class="actions">
      <button class="btn btn-orange" onclick="testPrint()">Test Print</button>
      <button class="btn btn-gray" onclick="checkPrinter()">Refresh</button>
    </div>
    <div id="printer-log" class="log" style="display:none;"></div>
  </div>

  <!-- Orders -->
  <div class="card">
    <h2>Orders</h2>
    <div class="stat"><span class="label">Total Orders</span><span class="value" id="orders-total">--</span></div>
    <div class="stat"><span class="label">Today</span><span class="value orange" id="orders-today">--</span></div>
    <div class="stat"><span class="label">Last Order</span><span class="value" id="orders-last">--</span></div>
  </div>

  <!-- Sync Queue -->
  <div class="card">
    <h2>Cloud Sync</h2>
    <div class="stat"><span class="label">Pending</span><span class="value" id="sync-pending">--</span></div>
    <div class="stat"><span class="label">Stale (>5min)</span><span class="value" id="sync-stale">--</span></div>
    <div class="stat"><span class="label">Total Queued</span><span class="value" id="sync-total">--</span></div>
    <div class="actions">
      <button class="btn btn-green" onclick="forceSync()">Force Sync</button>
      <button class="btn btn-red" onclick="clearStale()">Clear Stale</button>
    </div>
  </div>
</div>

<div class="footer">
  ChowBox Diagnostics &mdash; auto-refreshes every 5 seconds
</div>

<div class="toast" id="toast"></div>

<script>
let refreshInterval;

async function fetchStatus() {
  try {
    const res = await fetch('/api/v1/admin/status');
    const d = await res.json();

    // System
    const badge = document.getElementById('status-badge');
    badge.textContent = d.system.online ? 'ONLINE' : 'OFFLINE';
    badge.className = 'badge ' + (d.system.online ? 'online' : 'offline');

    document.getElementById('sys-internet').textContent = d.system.online ? 'Connected' : 'Disconnected';
    document.getElementById('sys-internet').className = 'value ' + (d.system.online ? 'green' : 'red');
    document.getElementById('sys-cloud').textContent = d.system.cloudUrl;
    document.getElementById('sys-uptime').textContent = formatUptime(d.system.uptime);
    document.getElementById('sys-memory').textContent = d.system.memoryMB + ' MB';
    document.getElementById('sys-node').textContent = d.system.nodeVersion;
    document.getElementById('sys-pid').textContent = d.system.pid;

    // Printer
    const ps = document.getElementById('printer-status');
    ps.textContent = d.printer.available ? 'Connected' : 'Not detected';
    ps.className = 'value ' + (d.printer.available ? 'green' : 'red');

    // Orders
    document.getElementById('orders-total').textContent = d.orders.total;
    document.getElementById('orders-today').textContent = d.orders.today;
    document.getElementById('orders-last').textContent = d.orders.lastOrderAt ? timeAgo(d.orders.lastOrderAt) : 'None';

    // Sync
    document.getElementById('sync-pending').textContent = d.sync.pending;
    document.getElementById('sync-pending').className = 'value ' + (d.sync.pending > 0 ? 'yellow' : 'green');
    document.getElementById('sync-stale').textContent = d.sync.stale;
    document.getElementById('sync-stale').className = 'value ' + (d.sync.stale > 0 ? 'red' : 'green');
    document.getElementById('sync-total').textContent = d.sync.total;
  } catch (e) {
    document.getElementById('status-badge').textContent = 'ERROR';
    document.getElementById('status-badge').className = 'badge offline';
  }
}

async function testPrint() {
  showToast('Sending test print...');
  try {
    const res = await fetch('/api/v1/print/test', { method: 'POST' });
    const d = await res.json();
    showToast(d.printed ? 'Test label printed!' : 'Print failed: ' + (d.error || 'unknown'));
    logPrinter(d.printed ? 'Test print OK' : 'Test print FAILED');
  } catch (e) { showToast('Print request failed'); }
}

async function checkPrinter() {
  const res = await fetch('/api/v1/print/status');
  const d = await res.json();
  const ps = document.getElementById('printer-status');
  ps.textContent = d.available ? 'Connected' : 'Not detected';
  ps.className = 'value ' + (d.available ? 'green' : 'red');
  showToast('Printer: ' + (d.available ? 'connected' : 'not found'));
}

async function forceSync() {
  showToast('Forcing sync...');
  await fetch('/api/v1/admin/sync-flush', { method: 'POST' });
  setTimeout(fetchStatus, 1000);
  showToast('Sync triggered');
}

async function clearStale() {
  if (!confirm('Clear all stale sync items older than 10 minutes?')) return;
  await fetch('/api/v1/admin/sync-clear', { method: 'POST' });
  setTimeout(fetchStatus, 500);
  showToast('Stale items cleared');
}

function formatUptime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function logPrinter(msg) {
  const log = document.getElementById('printer-log');
  log.style.display = 'block';
  const time = new Date().toLocaleTimeString();
  log.innerHTML = '<div class="log-entry">[' + time + '] ' + msg + '</div>' + log.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-refresh
fetchStatus();
refreshInterval = setInterval(fetchStatus, 5000);

// Countdown display
let countdown = 5;
setInterval(() => {
  countdown = countdown <= 1 ? 5 : countdown - 1;
  document.getElementById('refresh-timer').textContent = countdown + 's';
}, 1000);
</script>
</body>
</html>
