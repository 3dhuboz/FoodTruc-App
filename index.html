
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Canonical -->
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- Primary Meta Tags -->
    <title>Your Business | Mobile Food Truck & Catering Your City</title>
    <meta name="title" content="Your Business | Mobile Food Truck & Catering Your City">
    <meta name="description" content="Your City's premier mobile BBQ catering. Pre-order 12-hour wood-smoked brisket, pulled pork, ribs and gourmet burgers. Book our food truck for weddings, parties and corporate events.">
    <meta name="keywords" content="food truck, catering, mobile kitchen, your business name, wedding catering, corporate catering, event catering, food truck hire">
    <meta name="author" content="Your Business">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

    <!-- Local SEO (Your City/Your City Region) -->
    <meta name="geo.region" content="AU-XXX" />
    <meta name="geo.placename" content="Your City, Your State" />
    <meta name="geo.position" content="0.0;0.0" />
    <meta name="ICBM" content="0.0, 0.0" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="restaurant">
    <meta property="og:site_name" content="Your Business">
    <meta property="og:url" content="https://your-domain.com/">
    <meta property="og:title" content="Your Business | Mobile Food Truck & Catering">
    <meta property="og:description" content="Delicious food made fresh. Pre-order online for cook days or book us for your next event in Your City.">
    <meta property="og:image" content="https://your-domain.com/logo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Your Business Logo">
    <meta property="og:locale" content="en_AU">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@foodtruckapp">
    <meta name="twitter:url" content="https://your-domain.com/">
    <meta name="twitter:title" content="Your Business | Mobile Food Truck & Catering">
    <meta name="twitter:description" content="Delicious food made fresh. Pre-order online or book for events.">
    <meta name="twitter:image" content="https://your-domain.com/logo.png">
    <meta name="twitter:image:alt" content="Your Business">

    <!-- Favicon — SVG (modern browsers), PNG fallback, Apple touch icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" sizes="any" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

    <!-- PWA / Web App -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d9381e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Your Business" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#d9381e" />
    <meta name="msapplication-TileImage" content="/logo.png" />
    <meta name="msapplication-config" content="none" />

    <!-- Performance: preconnect for third-party origins -->
    <link rel="preconnect" href="https://connect.facebook.net" />
    <link rel="preconnect" href="https://graph.facebook.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />

    <!-- JSON-LD: Local Business Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodEstablishment",
      "name": "Your Business",
      "description": "Authentic American low & slow BBQ smoked over Your State Ironbark. Mobile catering and pre-order cook days serving Your City and Your City.",
      "url": "https://your-domain.com",
      "logo": "https://your-domain.com/logo.png",
      "image": "https://your-domain.com/logo.png",
      "telephone": "",
      "email": "",
      "servesCuisine": ["American BBQ", "Smoked Meats", "BBQ Catering"],
      "priceRange": "$$",
      "currenciesAccepted": "AUD",
      "paymentAccepted": "Cash, Credit Card",
      "areaServed": [
        {
          "@type": "City",
          "name": "Your City",
          "containedInPlace": { "@type": "State", "name": "Your State" }
        },
        {
          "@type": "City",
          "name": "Your City",
          "containedInPlace": { "@type": "State", "name": "Your State" }
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Your City",
        "addressRegion": "QLD",
        "addressCountry": "AU"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -27.6145,
        "longitude": 152.7625
      },
      "hasMap": "https://maps.google.com/?q=Your City+QLD+Australia",
      "sameAs": [
        "https://www.facebook.com/foodtruckapp",
        "https://www.instagram.com/foodtruckapp"
      ],
      "menu": "https://your-domain.com/#/menu",
      "makesOffer": [
        { "@type": "Offer", "itemOffered": { "@type": "MenuItem", "name": "Smoked Brisket" } },
        { "@type": "Offer", "itemOffered": { "@type": "MenuItem", "name": "Pulled Pork" } },
        { "@type": "Offer", "itemOffered": { "@type": "MenuItem", "name": "Smoked Pork Ribs" } },
        { "@type": "Offer", "itemOffered": { "@type": "MenuItem", "name": "BBQ Catering Packages" } }
      ]
    }
    </script>

    <script>
      window.fbAsyncInit = function() {
        console.log('Facebook SDK loaded and ready.');
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
